services:
  shorts-pipeline:
    build: .
    container_name: shorts-pipeline
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./music:/app/music:ro
      - ./secrets:/app/secrets:ro
    ports:
      - "8099:8099"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # closed-ish runtime defaults; only API egress needed
    security_opt:
      - no-new-privileges:true
    read_only: false
